<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自立活動 個別の指導計画アシスト</title>
    <link rel="stylesheet" href="./styles.css?v=compact-fields-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="work-pane" aria-label="指導計画編集">
        <header class="pane-header work-header">
          <div>
            <p class="eyebrow">計画作成</p>
            <h2>自立活動の個別の指導計画</h2>
          </div>
          <div class="doc-actions">
            <button id="newPlan" type="button">新規作成</button>
            <button id="printPlan" type="button">印刷</button>
            <button id="downloadPlan" type="button">テキスト保存</button>
          </div>
        </header>

        <div class="student-strip">
          <label>
            学年・組
            <input id="studentClass" type="text" placeholder="例：3年1組" />
          </label>
          <label>
            作成日
            <input id="createdDate" type="date" />
          </label>
        </div>

        <nav class="tabs" aria-label="編集エリア切り替え">
          <button class="tab is-active" type="button" data-tab="prompts">プロンプト</button>
          <button class="tab" type="button" data-tab="capture">AI回答の取り込み</button>
          <button class="tab" type="button" data-tab="plan">計画本文</button>
          <button class="tab" type="button" data-tab="settings">設定</button>
        </nav>

        <section class="tab-panel is-active" id="tab-prompts">
          <div class="prompt-toolbar">
            <label>
              プロンプトに追加する情報
              <textarea id="studentContext" rows="5" placeholder="AIに渡してよい匿名化済みの情報だけを入力します。プロンプトボタンを押すと、設定プロンプトの末尾にこの内容を追加します。"></textarea>
            </label>
          </div>
          <div class="prompt-grid" id="promptButtons"></div>
          <div class="copied-prompt">
            <label>
              コピーしたプロンプト
              <textarea id="copiedPrompt" rows="7" readonly></textarea>
            </label>
            <div class="inline-actions">
              <button id="copyAgain" type="button">再コピー</button>
              <span id="copyStatus" role="status"></span>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="tab-capture">
          <div class="capture-layout">
            <label>
              追加先の項目
              <select id="targetField"></select>
            </label>
            <label>
              AI回答から使う文章
              <textarea id="captureText" rows="10" placeholder="別ウィンドウのAI回答から必要な部分をコピーし、ここに貼り付けます。"></textarea>
            </label>
            <div class="inline-actions">
              <button id="appendToPlan" type="button">選んだ項目に追加</button>
              <button id="clearCapture" type="button">入力欄を空にする</button>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="tab-plan">
          <div class="plan-list" id="planFields"></div>
        </section>

        <section class="tab-panel" id="tab-settings">
          <div class="ai-launcher">
            <div>
              <h3>AIウィンドウ</h3>
              <p>選択したAIを新規ウィンドウで開きます。PC画面の左側にAI、右側にこのアプリを並べて使います。</p>
            </div>
            <div class="ai-controls">
              <select id="aiPreset" aria-label="開くAIサービス">
                <option value="https://gemini.google.com/">Gemini</option>
                <option value="https://copilot.microsoft.com/">Microsoft Copilot</option>
                <option value="https://chatgpt.com/">ChatGPT</option>
                <option value="https://claude.ai/">Claude</option>
                <option value="">任意URL</option>
              </select>
              <input id="aiUrl" type="url" value="https://gemini.google.com/" aria-label="AIサービスのURL" />
              <button id="openAi" type="button">AIを新規ウィンドウで開く</button>
            </div>
          </div>
          <div class="settings-header">
            <p>ボタン名と雛形プロンプトを編集できます。プロンプトボタンを押すと、「プロンプトに追加する情報」欄の内容が末尾に追加されます。</p>
            <button id="resetPrompts" type="button">初期プロンプトに戻す</button>
          </div>
          <div class="settings-list" id="promptSettings"></div>
        </section>
      </section>
    </main>

    <template id="promptButtonTemplate">
      <button class="prompt-button" type="button">
        <span class="prompt-title"></span>
        <span class="prompt-desc"></span>
      </button>
    </template>

    <template id="planFieldTemplate">
      <article class="plan-item">
        <header>
          <h3></h3>
          <button type="button" class="copy-field">項目をコピー</button>
        </header>
        <textarea rows="6"></textarea>
      </article>
    </template>

    <template id="settingTemplate">
      <article class="setting-item">
        <label>
          ボタン名
          <input class="setting-title" type="text" />
        </label>
        <label>
          説明
          <input class="setting-desc" type="text" />
        </label>
        <label>
          雛形プロンプト
          <textarea class="setting-template" rows="8"></textarea>
        </label>
      </article>
    </template>

    <div class="modal-backdrop" id="privacyModal" hidden>
      <section class="privacy-modal" role="dialog" aria-modal="true" aria-labelledby="privacyTitle">
        <header>
          <div>
            <p class="eyebrow">個人情報チェック</p>
            <h2 id="privacyTitle">AIに送る前に確認してください</h2>
          </div>
        </header>
        <p class="privacy-warning">
          「プロンプトに追加する情報」欄から、個人や団体を特定できる可能性がある文字列を検出しました。AIに送ってよい文字列だけチェックしてください。チェックしない文字列はコピー前に削除されます。
        </p>
        <div class="privacy-list" id="privacyList"></div>
        <label>
          コピーされるプロンプト
          <textarea id="privacyPreview" rows="9" readonly></textarea>
        </label>
        <div class="modal-actions">
          <button id="cancelPrivacy" type="button">キャンセル</button>
          <button id="copySanitizedPrompt" type="button">確認してコピー</button>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
